# RewardBench: Reward Model Evaluation via Pairwise Preference
# Based on "RewardBench: Evaluating Reward Models for Language Modeling" (Lambert et al., Findings NAACL 2025)
# Task: Pairwise preference annotation across chat, safety, reasoning, and coding categories

port: 8000
server_name: localhost
task_name: "RewardBench Reward Model Evaluation"

# Data configuration
data_files:
  - sample-data.json
id_key: id
text_key: text

# Output
output_file: annotations.json

# Display layout showing prompt and both responses side-by-side
html_layout: |
  <div class="rewardbench-container">
    <div class="category-bar" style="background: #e8eaf6; padding: 8px 15px; border-radius: 8px; margin-bottom: 15px;">
      <strong>Category:</strong> {{category}}
    </div>
    <div class="prompt-section" style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
      <h3 style="margin-top: 0;">Prompt:</h3>
      <div class="prompt-text" style="font-size: 15px; white-space: pre-wrap;">{{text}}</div>
    </div>
    <div class="responses-section" style="display: flex; gap: 20px;">
      <div class="chosen-response" style="flex: 1; background: #e8f5e9; padding: 15px; border-radius: 8px; border: 2px solid #2e7d32;">
        <h4 style="margin-top: 0; color: #2e7d32;">Response A (Chosen):</h4>
        <div class="response-text" style="white-space: pre-wrap; font-size: 14px;">{{chosen}}</div>
      </div>
      <div class="rejected-response" style="flex: 1; background: #ffebee; padding: 15px; border-radius: 8px; border: 2px solid #c62828;">
        <h4 style="margin-top: 0; color: #c62828;">Response B (Rejected):</h4>
        <div class="response-text" style="white-space: pre-wrap; font-size: 14px;">{{rejected}}</div>
      </div>
    </div>
  </div>

# Annotation schemes
annotation_schemes:
  # Pairwise preference
  - name: "preference"
    description: "Which response is better? Select your preference."
    annotation_type: pairwise
    labels:
      - "Chosen (A) is better"
      - "Rejected (B) is better"
      - "Tie - both equally good"
      - "Tie - both equally bad"
    keyboard_shortcuts:
      "Chosen (A) is better": "a"
      "Rejected (B) is better": "b"
      "Tie - both equally good": "t"
      "Tie - both equally bad": "n"

  # Confidence
  - name: "confidence"
    description: "How confident are you in your preference judgment?"
    annotation_type: radio
    labels:
      - "Very confident"
      - "Somewhat confident"
      - "Not confident"
    keyboard_shortcuts:
      "Very confident": "1"
      "Somewhat confident": "2"
      "Not confident": "3"

  # Difficulty
  - name: "difficulty"
    description: "How difficult was this comparison?"
    annotation_type: radio
    labels:
      - "Easy - clear difference"
      - "Medium - required thought"
      - "Hard - very close"
    keyboard_shortcuts:
      "Easy - clear difference": "z"
      "Medium - required thought": "x"
      "Hard - very close": "c"

# User configuration
allow_all_users: true

# Task assignment
instances_per_annotator: 200
annotation_per_instance: 2
